openapi: 3.1.0
info:
  title: nram API
  description: Neural RAM — persistent memory layer for AI agents.
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: http://localhost:8674
    description: Local development

tags:
  - name: Health
    description: System health and status
  - name: Setup
    description: Initial server setup
  - name: Auth
    description: Authentication endpoints
  - name: OAuth
    description: OAuth 2.0 Authorization Code + PKCE flow
  - name: Memories
    description: Project-scoped memory CRUD
  - name: User
    description: User-scoped (self-service) endpoints
  - name: Dashboard
    description: "Dashboard and activity — scoped by role"
  - name: Admin - Organizations
    description: Admin organization management
  - name: Admin - Users
    description: Admin user management
  - name: Admin - Projects
    description: Admin project management
  - name: Admin - Providers
    description: LLM/embedding provider configuration
  - name: Admin - Settings
    description: System settings
  - name: Admin - Webhooks
    description: Webhook management
  - name: Enrichment
    description: "Enrichment queue — read for all, writes admin-only"
  - name: Analytics
    description: "Memory analytics — scoped by role"
  - name: Usage
    description: "Token usage reporting — scoped by role"
  - name: Namespaces
    description: "Namespace hierarchy — scoped by role"
  - name: Admin - Database
    description: Database info and migration
  - name: Graph
    description: "Knowledge graph visualization — scoped by role"
  - name: Admin - OAuth
    description: OAuth client and IdP management
  - name: Org - Users
    description: "Org-scoped user management (org_owner+)"
  - name: Org - Projects
    description: "Org-scoped project listing (member+)"
  - name: Org - IdP
    description: "Org-scoped IdP configuration (org_owner+)"
  - name: Events
    description: Server-Sent Events

security:
  - BearerAuth: []

paths:
  # ── Health ──────────────────────────────────────────────────────────────
  /v1/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: System health check
      security: []
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: getMetrics
      tags: [Health]
      summary: Prometheus metrics (optional)
      security: []
      responses:
        "200":
          description: Prometheus text format

  # ── Setup ───────────────────────────────────────────────────────────────
  /v1/admin/setup/status:
    get:
      operationId: getSetupStatus
      tags: [Setup]
      summary: Check if initial setup is complete
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatusResponse"

  /v1/admin/setup:
    post:
      operationId: performSetup
      tags: [Setup]
      summary: Perform initial setup (create first admin account)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: Setup complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Setup already complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Auth ────────────────────────────────────────────────────────────────
  /v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/lookup:
    post:
      operationId: lookupAuthMethod
      tags: [Auth]
      summary: Check auth method for an email address
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Auth method lookup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  method:
                    type: string
                    enum: [local, idp, unknown]

  # ── OAuth Discovery & Flow ─────────────────────────────────────────────
  /.well-known/oauth-authorization-server:
    get:
      operationId: getOAuthMetadata
      tags: [OAuth]
      summary: OAuth 2.0 Authorization Server Metadata (RFC 8414)
      security: []
      responses:
        "200":
          description: Server metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthServerMetadata"

  /.well-known/oauth-protected-resource:
    get:
      operationId: getProtectedResourceMetadata
      tags: [OAuth]
      summary: OAuth Protected Resource Metadata (RFC 9728)
      security: []
      responses:
        "200":
          description: Protected resource metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthProtectedResourceMetadata"

  /authorize:
    get:
      operationId: oauthAuthorize
      tags: [OAuth]
      summary: OAuth authorization endpoint (redirects)
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256]
            default: S256
        - name: scope
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to redirect_uri with authorization code
        "400":
          description: OAuth error response

  /token:
    post:
      operationId: oauthToken
      tags: [OAuth]
      summary: OAuth token endpoint
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
                client_id:
                  type: string
                code_verifier:
                  type: string
                refresh_token:
                  type: string
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthTokenRequest"
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
        "400":
          description: OAuth error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthErrorResponse"

  /register:
    post:
      operationId: oauthRegisterClient
      tags: [OAuth]
      summary: Dynamic Client Registration (RFC 7591)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthClientRegistrationRequest"
      responses:
        "201":
          description: Client registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthClientRegistrationResponse"
        "400":
          description: Invalid request

  /userinfo:
    get:
      operationId: oauthUserInfo
      tags: [OAuth]
      summary: Get authenticated user info (OpenID Connect subset)
      responses:
        "200":
          description: User info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthUserInfoResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Events (SSE) ───────────────────────────────────────────────────────
  /v1/events:
    get:
      operationId: streamEvents
      tags: [Events]
      summary: Server-Sent Events stream
      parameters:
        - name: scope
          in: query
          description: Prefix filter for event scope (e.g. "project:<uuid>")
          schema:
            type: string
        - name: Last-Event-ID
          in: header
          description: Resume from this event ID
          schema:
            type: string
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

  # ── Project-Scoped Memories ─────────────────────────────────────────────
  /v1/projects/{project_id}/memories:
    post:
      operationId: storeMemory
      tags: [Memories]
      summary: Store a new memory
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreMemoryRequest"
      responses:
        "201":
          description: Memory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreMemoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      operationId: listMemories
      tags: [Memories]
      summary: List memories with pagination
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated memory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMemories"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/memories/{id}:
    get:
      operationId: getMemory
      tags: [Memories]
      summary: Get a single memory by ID
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MemoryId"
      responses:
        "200":
          description: Memory detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateMemory
      tags: [Memories]
      summary: Update a memory
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MemoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryRequest"
      responses:
        "200":
          description: Memory updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateMemoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteMemory
      tags: [Memories]
      summary: Soft-delete a single memory
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/MemoryId"
      responses:
        "200":
          description: Memory deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgetResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/memories/batch:
    post:
      operationId: batchStoreMemories
      tags: [Memories]
      summary: Store multiple memories in batch
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchStoreRequest"
      responses:
        "201":
          description: Batch store result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchStoreResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/projects/{project_id}/memories/get:
    post:
      operationId: batchGetMemories
      tags: [Memories]
      summary: Retrieve multiple memories by ID
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
      responses:
        "200":
          description: Batch get result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchGetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/projects/{project_id}/memories/recall:
    post:
      operationId: recallMemories
      tags: [Memories]
      summary: Semantic memory recall (vector search + ranking)
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallRequest"
      responses:
        "200":
          description: Recall results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{project_id}/memories/forget:
    post:
      operationId: bulkForgetMemories
      tags: [Memories]
      summary: Bulk delete memories by IDs or tags
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkForgetRequest"
      responses:
        "200":
          description: Forget result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/projects/{project_id}/memories/enrich:
    post:
      operationId: enrichMemories
      tags: [Memories]
      summary: Queue memories for enrichment (Postgres only)
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichRequest"
      responses:
        "200":
          description: Enrich result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/projects/{project_id}/memories/export:
    get:
      operationId: exportMemories
      tags: [Memories]
      summary: Export project data
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, ndjson]
            default: json
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportData"
            application/x-ndjson:
              schema:
                type: string

  /v1/projects/{project_id}/memories/import:
    post:
      operationId: importMemories
      tags: [Memories]
      summary: Import memories from file
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: format
          in: query
          schema:
            type: string
            enum: [nram, mem0, zep]
            default: nram
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── User-Scoped ────────────────────────────────────────────────────────
  /v1/me/memories/recall:
    post:
      operationId: meRecall
      tags: [User]
      summary: User-scoped memory recall (across all user projects)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallRequest"
      responses:
        "200":
          description: Recall results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/me/projects:
    get:
      operationId: meListProjects
      tags: [User]
      summary: List authenticated user's projects
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated project list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProjects"

    post:
      operationId: meCreateProject
      tags: [User]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Slug conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/me/api-keys:
    get:
      operationId: meListApiKeys
      tags: [User]
      summary: List authenticated user's API keys
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKey"

    post:
      operationId: meCreateApiKey
      tags: [User]
      summary: Create a new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created (key shown only once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/me/api-keys/{id}:
    delete:
      operationId: meRevokeApiKey
      tags: [User]
      summary: Revoke an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: boolean
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/me/oauth-clients:
    get:
      operationId: meListOAuthClients
      tags: [User]
      summary: List authenticated user's OAuth clients
      responses:
        "200":
          description: OAuth client list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/OAuthClient"

    post:
      operationId: meCreateOAuthClient
      tags: [User]
      summary: Create a new OAuth client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOAuthClientRequest"
      responses:
        "201":
          description: OAuth client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOAuthClientResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/me/oauth-clients/{id}:
    delete:
      operationId: meDeleteOAuthClient
      tags: [User]
      summary: Delete an OAuth client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Client deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Org-Scoped ─────────────────────────────────────────────────────────
  /v1/orgs/{org_id}/memories/recall:
    post:
      operationId: orgRecall
      tags: [Memories]
      summary: Org-scoped memory recall
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallRequest"
      responses:
        "200":
          description: Recall results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallResponse"

  # ── Scoped Data Viewing (readonly+) ────────────────────────────────────
  /v1/dashboard:
    get:
      operationId: getDashboard
      tags: [Dashboard]
      summary: Dashboard statistics scoped by role
      description: |
        Returns aggregate stats. Admin sees global data, org_owner sees their org,
        member/readonly/service see their org's data.
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /v1/activity:
    get:
      operationId: getActivity
      tags: [Dashboard]
      summary: Recent activity events scoped by role
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Activity events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityEvent"

  /v1/analytics:
    get:
      operationId: getAnalytics
      tags: [Analytics]
      summary: Memory analytics scoped by role
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"

  /v1/usage:
    get:
      operationId: getUsage
      tags: [Usage]
      summary: Token usage scoped by role
      description: |
        Admin can filter by ?org=, ?user=, ?project= query params.
        Non-admin users are restricted to their own org and user.
      parameters:
        - name: org
          in: query
          description: Filter by org (admin only)
          schema:
            type: string
            format: uuid
        - name: user
          in: query
          description: Filter by user (admin only)
          schema:
            type: string
            format: uuid
        - name: project
          in: query
          description: Filter by project
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: group_by
          in: query
          schema:
            type: string
            enum: [org, user, project, operation, model]
            default: operation
      responses:
        "200":
          description: Usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageReport"

  /v1/graph:
    get:
      operationId: getGraph
      tags: [Graph]
      summary: Entity graph for a project (scoped by org membership)
      parameters:
        - name: project
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/namespaces/tree:
    get:
      operationId: getNamespaceTree
      tags: [Namespaces]
      summary: Namespace hierarchy scoped by role
      responses:
        "200":
          description: Namespace tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespaceTreeResponse"

  /v1/enrichment:
    get:
      operationId: getEnrichmentStatus
      tags: [Enrichment]
      summary: Enrichment queue status (all authenticated users)
      responses:
        "200":

      summary: Get webhook by ID
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Webhook detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: adminUpdateWebhook
      tags: [Admin - Webhooks]
      summary: Update a webhook
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookUpdateRequest"
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: adminDeleteWebhook
      tags: [Admin - Webhooks]
      summary: Delete a webhook
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Webhook deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/webhooks/{id}/test:
    post:
      operationId: adminTestWebhook
      tags: [Admin - Webhooks]
      summary: Fire a test event to a webhook
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResult"

  # ── Admin: Database ────────────────────────────────────────────────────
  /v1/admin/database:
    get:
      operationId: adminGetDatabaseInfo
      tags: [Admin - Database]
      summary: Get current database backend info and statistics
      responses:
        "200":
          description: Database info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseInfo"

  /v1/admin/database/test:
    post:
      operationId: adminTestDatabaseConnection
      tags: [Admin - Database]
      summary: Test a PostgreSQL connection URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /v1/admin/database/migrate:
    post:
      operationId: adminTriggerMigration
      tags: [Admin - Database]
      summary: Trigger SQLite-to-Postgres migration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "202":
          description: Migration accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MigrationStatus"

  # ── Admin: OAuth ───────────────────────────────────────────────────────
  /v1/admin/oauth/clients:
    get:
      operationId: adminListOAuthClients
      tags: [Admin - OAuth]
      summary: List all OAuth clients
      responses:
        "200":
          description: OAuth client list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminOAuthClientResponse"

    post:
      operationId: adminCreateOAuthClient
      tags: [Admin - OAuth]
      summary: Create an OAuth client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                redirect_uris:
                  type: array
                  items:
                    type: string
                client_type:
                  type: string
                  enum: [public, confidential]
                  default: confidential
      responses:
        "201":
          description: OAuth client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOAuthClientCreatedResponse"

  /v1/admin/oauth/clients/{id}:
    delete:
      operationId: adminDeleteOAuthClient
      tags: [Admin - OAuth]
      summary: Delete an OAuth client
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Client deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/oauth/idp:
    get:
      operationId: adminListIdPs
      tags: [Admin - OAuth]
      summary: List identity providers
      responses:
        "200":
          description: IdP list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OAuthIdPConfig"

    post:
      operationId: adminCreateIdP
      tags: [Admin - OAuth]
      summary: Create an identity provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdPRequest"
      responses:
        "201":
          description: IdP created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthIdPConfig"

  /v1/admin/oauth/idp/{id}:
    delete:
      operationId: adminDeleteIdP
      tags: [Admin - OAuth]
      summary: Delete an identity provider
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: IdP deleted
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: JWT token or API key (prefixed with nram_k_)

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrgId:
      name: org_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Organization ID
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 200
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: "Forbidden — insufficient role or org membership"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Error ──────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [bad_request, unauthorized, forbidden, not_found, conflict, rate_limited, internal_error]
            message:
              type: string
            details:
              type: object

    # ── Core Models ────────────────────────────────────────────────────
    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespace_id:
          type: string
          format: uuid
        content:
          type: string
        embedding_dim:
          type: integer
          nullable: true
        source:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        confidence:
          type: number
          format: double
        importance:
          type: number
          format: double
        access_count:
          type: integer
        last_accessed:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        superseded_by:
          type: string
          format: uuid
          nullable: true
        enriched:
          type: boolean
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        purge_after:
          type: string
          format: date-time
          nullable: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        org_id:
          type: string
          format: uuid
        namespace_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/UserRole"
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
        disabled_at:
          type: string
          format: date-time
          nullable: true

    UserRole:
      type: string
      enum: [administrator, org_owner, member, readonly, service]

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        namespace_id:
          type: string
          format: uuid
        owner_namespace_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        default_tags:
          type: array
          items:
            type: string
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    APIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        key_prefix:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
            format: uuid
        last_used:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    OAuthClient:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
        name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string
        org_id:
          type: string
          format: uuid
          nullable: true
        auto_registered:
          type: boolean
        created_at:
          type: string
          format: date-time

    OAuthIdPConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
          nullable: true
        provider_type:
          type: string
        client_id:
          type: string
        issuer_url:
          type: string
          nullable: true
        allowed_domains:
          type: array
          items:
            type: string
        auto_provision:
          type: boolean
        default_role:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        scope:
          type: string
        active:
          type: boolean
        last_fired:
          type: string
          format: date-time
          nullable: true
        last_status:
          type: integer
          nullable: true
        failure_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Setting:
      type: object
      properties:
        key:
          type: string
        value: {}
        scope:
          type: string
        updated_by:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Health ─────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        backend:
          type: string
          enum: [sqlite, postgres]
        database:
          type: object
          properties:
            status:
              type: string
              enum: [ok, error]
            latency_ms:
              type: integer
              format: int64
        providers:
          type: object
          properties:
            embedding:
              $ref: "#/components/schemas/HealthProviderStatus"
            fact_extraction:
              $ref: "#/components/schemas/HealthProviderStatus"
            entity_extraction:
              $ref: "#/components/schemas/HealthProviderStatus"
        enrichment_queue:
          type: object
          nullable: true
          properties:
            pending:
              type: integer
            processing:
              type: integer
            failed:
              type: integer
        uptime_seconds:
          type: integer
          format: int64

    HealthProviderStatus:
      type: object
      properties:
        status:
          type: string
        provider:
          type: string
        model:
          type: string
        latency_ms:
          type: integer
          format: int64
          nullable: true

    # ── Setup ──────────────────────────────────────────────────────────
    SetupStatusResponse:
      type: object
      properties:
        setup_complete:
          type: boolean
        backend:
          type: string
          enum: [sqlite, postgres]

    SetupRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    SetupResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        api_key:
          type: string
        token:
          type: string
        message:
          type: string

    # ── Auth ───────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            display_name:
              type: string
            role:
              $ref: "#/components/schemas/UserRole"
            org_id:
              type: string
              format: uuid

    # ── OAuth ──────────────────────────────────────────────────────────
    OAuthServerMetadata:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        registration_endpoint:
          type: string
        userinfo_endpoint:
          type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string

    OAuthProtectedResourceMetadata:
      type: object
      properties:
        resource:
          type: string
        authorization_servers:
          type: array
          items:
            type: string
        bearer_methods_supported:
          type: array
          items:
            type: string

    OAuthTokenRequest:
      type: object
      required: [grant_type]
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token]
        code:
          type: string
        redirect_uri:
          type: string
          format: uri
        client_id:
          type: string
        code_verifier:
          type: string
        refresh_token:
          type: string

    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
        refresh_token:
          type: string

    OAuthErrorResponse:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string

    OAuthClientRegistrationRequest:
      type: object
      required: [client_name, redirect_uris]
      properties:
        client_name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string

    OAuthClientRegistrationResponse:
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        client_name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string

    OAuthUserInfoResponse:
      type: object
      properties:
        sub:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        org_id:
          type: string

    # ── Memory Operations ──────────────────────────────────────────────
    StoreMemoryRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        source:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        options:
          type: object
          properties:
            enrich:
              type: boolean
              default: false
            extract:
              type: boolean
              default: false
            ttl:
              type: string
              description: Duration string (e.g. "30d", "7d", "24h")

    StoreMemoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        project_slug:
          type: string
        path:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        enriched:
          type: boolean
        enrichment_queued:
          type: boolean
        latency_ms:
          type: integer
          format: int64

    UpdateMemoryRequest:
      type: object
      properties:
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object

    UpdateMemoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        previous_content:
          type: string
        re_embedded:
          type: boolean
        latency_ms:
          type: integer
          format: int64

    BatchStoreRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [content]
            properties:
              content:
                type: string
              source:
                type: string
              tags:
                type: array
                items:
                  type: string
              metadata:
                type: object
          minItems: 1
        options:
          type: object
          properties:
            enrich:
              type: boolean
              default: false
            extract:
              type: boolean
              default: false
            ttl:
              type: string

    BatchStoreResponse:
      type: object
      properties:
        processed:
          type: integer
        memories_created:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: string
        latency_ms:
          type: integer
          format: int64

    BatchGetResponse:
      type: object
      properties:
        found:
          type: array
          items:
            $ref: "#/components/schemas/MemoryDetail"
        not_found:
          type: array
          items:
            type: string
            format: uuid
        latency_ms:
          type: integer
          format: int64

    MemoryDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          nullable: true
        metadata:
          type: object
        enriched:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RecallRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        limit:
          type: integer
        threshold:
          type: number
          format: double
        tags:
          type: array
          items:
            type: string
        include_graph:
          type: boolean
          default: false
        graph_depth:
          type: integer

    RecallResponse:
      type: object
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/RecallResult"
        graph:
          type: object
          properties:
            entities:
              type: array
              items:
                $ref: "#/components/schemas/RecallEntity"
            relationships:
              type: array
              items:
                $ref: "#/components/schemas/RecallRelationship"
        total_searched:
          type: integer
        latency_ms:
          type: integer
          format: int64

    RecallRelationship:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        target_id:
          type: string
          format: uuid
        relation:
          type: string
        weight:
          type: number
          format: double

    RecallResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        project_slug:
          type: string
        path:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        source:
          type: string
          nullable: true
        score:
          type: number
          format: double
        similarity:
          type: number
          format: double
          nullable: true
        confidence:
          type: number
          format: double
        shared_from:
          type: string
          nullable: true
        access_count:
          type: integer
        enriched:
          type: boolean
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    RecallEntity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string

    BulkForgetRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        tags:
          type: array
          items:
            type: string
        hard:
          type: boolean
          default: false

    ForgetResponse:
      type: object
      properties:
        deleted:
          type: integer
        latency_ms:
          type: integer
          format: int64

    EnrichRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        all:
          type: boolean
        priority:
          type: integer

    EnrichResponse:
      type: object
      properties:
        queued:
          type: integer
        skipped:
          type: integer
        latency_ms:
          type: integer
          format: int64

    # ── Export/Import ──────────────────────────────────────────────────
    ExportData:
      type: object
      properties:
        version:
          type: string
        exported_at:
          type: string
          format: date-time
        project:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            slug:
              type: string
        memories:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              content:
                type: string
              tags:
                type: array
                items:
                  type: string
              source:
                type: string
                nullable: true
              confidence:
                type: number
                format: double
              importance:
                type: number
                format: double
              enriched:
                type: boolean
              metadata:
                type: object
              lineage:
                type: array
                items:
                  type: object
                  properties:
                    parent_id:
                      type: string
                      format: uuid
                      nullable: true
                    relation:
                      type: string
              created_at:
                type: string
                format: date-time
        entities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              type:
                type: string
              canonical:
                type: string
              properties:
                type: object
              mention_count:
                type: integer
        relationships:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              source_id:
                type: string
                format: uuid
              target_id:
                type: string
                format: uuid
              relation:
                type: string
              weight:
                type: number
                format: double
              valid_from:
                type: string
                format: date-time
              valid_until:
                type: string
                format: date-time
                nullable: true
        stats:
          type: object
          properties:
            memory_count:
              type: integer
            entity_count:
              type: integer
            relationship_count:
              type: integer

    ImportResponse:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: string
        latency_ms:
          type: integer
          format: int64

    # ── Namespace Tree ───────────────────────────────────────────────
    NamespaceTreeResponse:
      type: object
      properties:
        tree:
          type: array
          items:
            $ref: "#/components/schemas/NamespaceNode"

    # ── Paginated Responses ───────────────────────────────────────────
    PaginatedUsers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedAPIKeys:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedMemories:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Memory"
        pagination:
          $ref: "#/components/schemas/Pagination"

    PaginatedProjects:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ── User Self-Service ─────────────────────────────────────────────
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        slug:
          type: string
          description: Auto-generated from name if omitted
        description:
          type: string
        default_tags:
          type: array
          items:
            type: string

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
            format: uuid
        expires_at:
          type: string
          format: date-time

    CreateAPIKeyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Full API key (shown only once)
        key_prefix:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    CreateOAuthClientRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string

    CreateOAuthClientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
        client_secret:
          type: string
          nullable: true
        name:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Org-Scoped User Requests ────────────────────────────────────
    UserDetail:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            api_keys:
              type: array
              items:
                $ref: "#/components/schemas/APIKey"

    CreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        password:
          type: string
          minLength: 8
        role:
          $ref: "#/components/schemas/UserRole"

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        settings:
          type: object

    GeneratedAPIKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Full API key (shown only once)
        label:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          nullable: true
        created_at:
          type: string

    # ── Admin Requests ────────────────────────────────────────────────
    AdminCreateUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        password:
          type: string
          minLength: 8
        role:
          $ref: "#/components/schemas/UserRole"
        organization_id:
          type: string
          format: uuid

    AdminCreateProjectRequest:
      type: object
      required: [name, slug, owner_namespace_id]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        owner_namespace_id:
          type: string
          format: uuid
        default_tags:
          type: array
          items:
            type: string
        settings:
          type: object

    AdminGenerateAPIKeyResponse:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          nullable: true
        created_at:
          type: string

    # ── Admin OAuth ───────────────────────────────────────────────────
    AdminOAuthClientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        client_id:
          type: string
        type:
          type: string
          enum: [auto, manual]
        client_type:
          type: string
          enum: [public, confidential]
        redirect_uris:
          type: array
          items:
            type: string
        created_at:
          type: string

    AdminOAuthClientCreatedResponse:
      allOf:
        - $ref: "#/components/schemas/AdminOAuthClientResponse"
        - type: object
          properties:
            client_secret:
              type: string
              nullable: true

    CreateIdPRequest:
      type: object
      required: [org_id, provider_type, client_id, client_secret]
      properties:
        org_id:
          type: string
        provider_type:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        issuer_url:
          type: string
          nullable: true
        allowed_domains:
          type: array
          items:
            type: string
        auto_provision:
          type: boolean

    # ── Dashboard ─────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        total_memories:
          type: integer
        total_projects:
          type: integer
        total_users:
          type: integer
        total_entities:
          type: integer
        total_organizations:
          type: integer
        memories_by_project:
          type: array
          items:
            type: object
            properties:
              project_id:
                type: string
                format: uuid
              project_name:
                type: string
              count:
                type: integer
        enrichment_queue:
          type: object
          nullable: true
          properties:
            pending:
              type: integer
            processing:
              type: integer
            failed:
              type: integer

    ActivityEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        summary:
          type: string
        project_id:
          type: string
          format: uuid
          nullable: true
        user_id:
          type: string
          format: uuid
          nullable: true
        timestamp:
          type: string
          format: date-time

    # ── Providers ─────────────────────────────────────────────────────
    ProviderConfigResponse:
      type: object
      properties:
        embedding:
          $ref: "#/components/schemas/ProviderSlotStatus"
        fact:
          $ref: "#/components/schemas/ProviderSlotStatus"
        entity:
          $ref: "#/components/schemas/ProviderSlotStatus"

    ProviderSlotStatus:
      type: object
      properties:
        configured:
          type: boolean
        type:
          type: string
        url:
          type: string
        model:
          type: string
        dimensions:
          type: integer
          nullable: true
        status:
          type: string
        latency_ms:
          type: integer
          format: int64
          nullable: true

    ProviderTestRequest:
      type: object
      required: [slot, config]
      properties:
        slot:
          type: string
          enum: [embedding, fact, entity]
        config:
          $ref: "#/components/schemas/ProviderSlotConfig"

    ProviderSlotConfig:
      type: object
      required: [type]
      properties:
        type:
          type: string
        url:
          type: string
        api_key:
          type: string
        model:
          type: string
        dimensions:
          type: integer

    ProviderTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        latency_ms:
          type: integer
          format: int64

    OllamaModel:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
          format: int64
        modified_at:
          type: string

    # ── Settings Schema ───────────────────────────────────────────────
    SettingSchema:
      type: object
      properties:
        key:
          type: string
        type:
          type: string
        default_value: {}
        description:
          type: string
        category:
          type: string

    # ── Webhooks ──────────────────────────────────────────────────────
    WebhookCreateRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        scope:
          type: string
          default: global
        events:
          type: array
          items:
            type: string
          minItems: 1
        secret:
          type: string
          nullable: true
        active:
          type: boolean
          default: true

    WebhookUpdateRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        scope:
          type: string
        events:
          type: array
          items:
            type: string
          minItems: 1
        secret:
          type: string
          nullable: true
        active:
          type: boolean

    WebhookTestResult:
      type: object
      properties:
        success:
          type: boolean
        status_code:
          type: integer
        message:
          type: string
        latency_ms:
          type: integer
          format: int64

    # ── Enrichment ────────────────────────────────────────────────────
    EnrichmentQueueStatus:
      type: object
      properties:
        counts:
          type: object
          properties:
            pending:
              type: integer
            processing:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              memory_id:
                type: string
                format: uuid
              status:
                type: string
              attempts:
                type: integer
              last_error:
                type: string
              created_at:
                type: string
                format: date-time
        paused:
          type: boolean

    EnrichmentTestPromptRequest:
      type: object
      required: [type, sample_input]
      properties:
        type:
          type: string
          enum: [fact, entity]
        prompt:
          type: string
          description: Custom prompt (uses default if empty)
        sample_input:
          type: string

    EnrichmentTestPromptResponse:
      type: object
      properties:
        output:
          type: string
        parsed: {}
        error:
          type: string
        latency_ms:
          type: integer
          format: int64

    # ── Analytics ─────────────────────────────────────────────────────
    AnalyticsData:
      type: object
      properties:
        memory_counts:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            deleted:
              type: integer
            enriched:
              type: integer
        most_recalled:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRankItem"
        least_recalled:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRankItem"
        dead_weight:
          type: array
          items:
            $ref: "#/components/schemas/MemoryRankItem"
        enrichment_stats:
          type: object
          properties:
            total_processed:
              type: integer
            success_rate:
              type: number
              format: double
            failure_rate:
              type: number
              format: double
            avg_latency_ms:
              type: integer
              format: int64

    MemoryRankItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        access_count:
          type: integer
        project_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Usage ─────────────────────────────────────────────────────────
    UsageReport:
      type: object
      properties:
        groups:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              tokens_input:
                type: integer
                format: int64
              tokens_output:
                type: integer
                format: int64
              call_count:
                type: integer
                format: int64
        totals:
          type: object
          properties:
            tokens_input:
              type: integer
              format: int64
            tokens_output:
              type: integer
              format: int64
            call_count:
              type: integer
              format: int64

    # ── Namespaces ────────────────────────────────────────────────────
    NamespaceNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        kind:
          type: string
        path:
          type: string
        depth:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/NamespaceNode"

    # ── Database ──────────────────────────────────────────────────────
    DatabaseInfo:
      type: object
      properties:
        backend:
          type: string
          enum: [sqlite, postgres]
        version:
          type: string
        sqlite:
          type: object
          nullable: true
          properties:
            file_path:
              type: string
            file_size_bytes:
              type: integer
              format: int64
        postgres:
          type: object
          nullable: true
          properties:
            host:
              type: string
            database:
              type: string
            pgvector_version:
              type: string
            active_connections:
              type: integer
            idle_connections:
              type: integer
            max_connections:
              type: integer
        data_counts:
          type: object
          properties:
            memories:
              type: integer
            entities:
              type: integer
            projects:
              type: integer
            users:
              type: integer
            organizations:
              type: integer

    ConnectionTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        pgvector_installed:
          type: boolean
        latency_ms:
          type: integer
          format: int64

    MigrationStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    # ── Graph ─────────────────────────────────────────────────────────
    GraphResponse:
      type: object
      properties:
        entities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              canonical:
                type: string
              entity_type:
                type: string
              mention_count:
                type: integer
              aliases:
                type: array
                items:
                  type: string
              created_at:
                type: string
              updated_at:
                type: string
        relationships:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              source_id:
                type: string
              target_id:
                type: string
              relation:
                type: string
              weight:
                type: number
                format: double

    # ── SSE Event ─────────────────────────────────────────────────────
    Event:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - memory.created
            - memory.enriched
            - memory.updated
            - memory.deleted
            - entity.created
            - relationship.created
            - relationship.expired
            - conflict.detected
            - enrichment.failed
        scope:
          type: string
        data:
          type: object
        timestamp:
          type: string
          format: date-time
